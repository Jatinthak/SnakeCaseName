The error message suggests that there is a problem with the YAML syntax in the `docker-compose.yml` file. Specifically, it's indicating an issue where the character '`' (which represents a newline) cannot start any token.

To fix this error and ensure proper YAML formatting:

1. **Correcting the line endings**: Ensure all lines end with a new line (`\n`). This is important for correct parsing of YAML files.
2. **Adding spaces around tokens**: In YAML, it's common to use indentation (usually 4 spaces) to separate different parts of your configuration.

