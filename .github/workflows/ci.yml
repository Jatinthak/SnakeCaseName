```yaml
name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  deploy-frontend-to-vercel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          ref: main
      - name: Deploy Frontend to Vercel
        run: |
          vercel --token VERCEL_TOKEN --service-id RENDER_SERVICE_ID deploy \
            --skip-verifying \
            --push-to-production

  deploy-backend-to-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          ref: main
      - name: Deploy Backend to Render
        run: |
          render --token RENDER_TOKEN --service-id $RENDER_SERVICE_ID \
            build \
            --push-to-production

```