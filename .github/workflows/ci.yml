name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          ref: main
      - name: Build Docker Image
        run: |
          docker build -t my-app .

